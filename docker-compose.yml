services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GOALCAST_DB_PATH=data/goalcast.db
    volumes:
      - ./backend/.env:/app/.env:ro
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
